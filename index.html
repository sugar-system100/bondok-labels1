<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>طباعة استيكرات المنتجات</title>



<style>

body{

    font-family: Tahoma, Arial;

    padding:20px;

    background:#f5f5f5;

}



.container{

    max-width:600px;

    margin:auto;

    background:#fff;

    padding:20px;

    border-radius:10px;

}



input{

    width:100%;

    padding:10px;

    margin-bottom:10px;

    box-sizing:border-box;

}



button{

    padding:10px 15px;

    cursor:pointer;

    margin:5px;

}



table{

    width:100%;

    border-collapse:collapse;

    margin-top:15px;

}



th,td{

    border:1px solid #ddd;

    padding:8px;

    text-align:center;

}



@media print {



    body *{

        visibility:hidden;

    }



    #printArea,

    #printArea *{

        visibility:visible;

    }



    #printArea{

        position:absolute;

        top:0;

        right:0;

        width:40mm;

    }



    .label{

        width:40mm;

        height:10mm;

        box-sizing:border-box;

        overflow:hidden;

        page-break-after:always;



        display:flex;

        flex-direction:column;

        justify-content:center;

        align-items:center;



        text-align:center;

    }



    .product{

        font-size:10pt;

        font-weight:bold;

        line-height:1;

    }



    .price{

        font-size:8pt;

        font-weight:bold;

        line-height:1;

    }



    .shop{

        font-size:6pt;

        line-height:1;

    }

}



#printArea{

    display:none;

}

</style>

</head>



<body>



<div class="container">



<h2>طباعة استيكرات المنتجات</h2>



<input type="text" id="product" placeholder="اسم المنتج">



<input type="text" id="price" placeholder="السعر">



<input type="number" id="copies" placeholder="عدد النسخ" value="1">



<button onclick="addProduct()">إضافة</button>



<button onclick="printLabels()">طباعة</button>



<table>

<thead>

<tr>

<th>المنتج</th>

<th>السعر</th>

<th>النسخ</th>

<th>حذف</th>

</tr>

</thead>



<tbody id="tableBody"></tbody>



</table>



</div>



<div id="printArea"></div>



<script>



let products = JSON.parse(localStorage.getItem("products") || "[]");



function save(){

    localStorage.setItem("products", JSON.stringify(products));

}



function render(){



    let html = "";



    products.forEach((p,index)=>{



        html += `

        <tr>

            <td>${p.name}</td>

            <td>${p.price}</td>

            <td>${p.copies}</td>

            <td>

                <button onclick="removeProduct(${index})">

                    حذف

                </button>

            </td>

        </tr>

        `;

    });



    document.getElementById("tableBody").innerHTML = html;

}



function addProduct(){



    const name =

    document.getElementById("product").value.trim();



    const price =

    document.getElementById("price").value.trim();



    const copies =

    parseInt(document.getElementById("copies").value || 1);



    if(!name || !price){

        alert("أدخل اسم المنتج والسعر");

        return;

    }



    products.push({

        name,

        price,

        copies

    });



    save();

    render();



    document.getElementById("product").value="";

    document.getElementById("price").value="";

    document.getElementById("copies").value="1";

}



function removeProduct(index){



    products.splice(index,1);



    save();

    render();

}



function printLabels(){



    let html = "";



    products.forEach(product=>{



        for(let i=0;i<product.copies;i++){



            html += `

            <div class="label">



                <div class="product">

                    ${product.name}

                </div>



                <div class="price">

                    ${product.price} ج

                </div>



                <div class="shop">

                    حلويات بندق

                </div>



            </div>

            `;

        }



    });



    document.getElementById("printArea").innerHTML = html;



    document.getElementById("printArea").style.display="block";



    window.print();



    document.getElementById("printArea").style.display="none";

}



render();



</script>



</body>

</html>
