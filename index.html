<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حلواني بندق | الطباعة كصورة</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
    body { background: #fdfcfb; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    
    /* تصميم الستيكر الأساسي الذي سيتم تحويله لصورة */
    #labelToRender {
      width: 30mm;
      height: 25mm;
      background: white;
      border: 1px solid #000; /* إطار خفيف لضمان الحدود */
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 1.5mm;
      box-sizing: border-box;
      position: absolute;
      left: -9999px; /* إخفاؤه عن المستخدم، نستخدمه فقط للتصوير */
    }

    .right-section { flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: right; overflow: hidden; padding-left: 1mm; }
    .price-section { border: 1.5px solid #000; border-radius: 2px; width: 33%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; }
    
    .text-title { font-size: 10pt; font-weight: 900; color: #000; line-height: 1.1; white-space: nowrap; }
    .text-weight { font-size: 8pt; font-weight: 900; color: #000; margin: 1mm 0; }
    .text-footer { font-size: 6pt; font-weight: 700; color: #000; line-height: 1; }
    
    .text-price { font-size: 15pt; font-weight: 900; color: #000; line-height: 1; margin-bottom: -1mm; }
    .text-currency { font-size: 6.5pt; font-weight: 900; color: #000; }

    /* ستايل الطباعة الفعلي (يطبع الصورة فقط) */
    @media print {
      body * { visibility: hidden !important; }
      #printArea, #printArea * { visibility: visible !important; }
      #printArea {
        position: absolute; top: 0; left: 0;
        width: 30mm; height: 25mm;
        margin: 0; padding: 0;
        display: flex; justify-content: center; align-items: center;
      }
      #printArea img {
        width: 30mm !important; 
        height: 25mm !important;
        object-fit: contain;
      }
      @page { size: 30mm 25mm; margin: 0; }
    }
  </style>
</head>
<body>

  <div class="w-full max-w-xl bg-white border border-gray-200 rounded-2xl p-6 shadow-xl text-center">
    <h1 class="text-2xl font-black text-amber-700 mb-2">طباعة الملصق كصورة (الحل النهائي)</h1>
    <p class="text-sm text-gray-500 mb-6 font-bold">هذا الكود يحول التصميم إلى صورة عالية الدقة لمنع الطابعة من تخريب التنسيق.</p>

    <div class="space-y-4 mb-6 text-right">
      <div>
        <label class="text-xs font-bold text-gray-600">اسم المنتج</label>
        <input type="text" id="inpName" value="قرقش بالعجوة" class="w-full border rounded-lg px-3 py-2 font-bold focus:border-amber-500 outline-none">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-600">الوزن</label>
        <input type="text" id="inpWeight" value="500 جرام" class="w-full border rounded-lg px-3 py-2 font-bold focus:border-amber-500 outline-none">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-600">السعر</label>
        <input type="text" id="inpPrice" value="145" class="w-full border rounded-lg px-3 py-2 font-black text-amber-700 focus:border-amber-500 outline-none">
      </div>
    </div>

    <button id="printBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black py-3 rounded-xl shadow-md transition flex items-center justify-center gap-2">
      <i class="fas fa-print"></i> تجهيز الصورة والطباعة
    </button>
  </div>

  <div id="labelToRender">
    <div class="right-section">
      <div id="renderName" class="text-title">قرقش بالعجوة</div>
      <div id="renderWeight" class="text-weight">500 جرام</div>
      <div class="text-footer">حلواني بندق - فرع النزهة</div>
    </div>
    <div class="price-section">
      <span id="renderPrice" class="text-price">145</span>
      <span class="text-currency">ج.م</span>
    </div>
  </div>

  <div id="printArea"></div>

  <script>
    document.getElementById('printBtn').addEventListener('click', () => {
      // 1. تحديث البيانات
      document.getElementById('renderName').textContent = document.getElementById('inpName').value;
      document.getElementById('renderWeight').textContent = document.getElementById('inpWeight').value;
      document.getElementById('renderPrice').textContent = document.getElementById('inpPrice').value;

      // إخفاء الوزن إذا كان فارغاً
      const weightElem = document.getElementById('renderWeight');
      weightElem.style.display = document.getElementById('inpWeight').value ? 'block' : 'none';

      // 2. تحويل العنصر إلى صورة
      const label = document.getElementById('labelToRender');
      
      // رفع دقة الصورة (Scale: 4) لضمان طباعة واضحة جداً
      html2canvas(label, { scale: 4, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
        
        // 3. مسح منطقة الطباعة القديمة ووضع الصورة الجديدة
        const printArea = document.getElementById('printArea');
        printArea.innerHTML = ''; 
        
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        printArea.appendChild(img);

        // 4. فتح نافذة الطباعة
        setTimeout(() => {
          window.print();
        }, 300);
      });
    });
  </script>
</body>
</html>
