        /* تنسيق الحاوية البيضاء للمعاينة */
        .preview-container {

    <!-- كود الجافاسكربت -->
    <script>
        // تعريف المتغيرات للحقول
        const inputs = {
            name: document.getElementById('productNameInput'),
            desc: document.getElementById('productDescInput'),
            price: document.getElementById('productPriceInput'),
            shop: document.getElementById('shopNameInput'),
            size: document.getElementById('printerSize')
        };

        const printArea = document.getElementById('print-area');
        const bodyLayout = document.getElementById('bodyLayout');
        const previewBadge = document.getElementById('previewBadge');

        // استرجاع الإعدادات المحفوظة عند تحميل الصفحة
        window.onload = () => {
            const savedShopName = localStorage.getItem('thermal_shop_name');
            const savedPrinterSize = localStorage.getItem('thermal_printer_size');
            
            if (savedShopName) inputs.shop.value = savedShopName;
            if (savedPrinterSize) inputs.size.value = savedPrinterSize;
            
            updateLabelPreview();
        };

        // وظيفة بناء تصميم الاستيكر الواحد
        function buildSingleLabelHTML(name, desc, price, shop, isTopLabel = false) {
            // الكلاس print-no-border سيخفي الخط الوهمي أثناء الطباعة الفعليه
            const addBorderClass = isTopLabel ? 'print-no-border' : '';
            return `
                <div class="single-label ${addBorderClass}">
                    <div class="p-name text-gray-900 break-words">${name || 'اسم الصنف'}</div>
                    ${desc ? `<div class="p-desc text-gray-700 break-words">${desc}</div>` : ''}
                    
                    <div class="p-price-box border-black">
                         <span class="text-xs font-bold">السعر:</span>
                         <span class="p-price mx-1">${price || '0'}</span>
                         <span class="text-xs font-bold">ج.م</span>
                    </div>

                    <div class="p-shop text-gray-800 break-words">
                        <span class="block mb-1">حلواني بندق - اصل الطعم</span>
                        <span class="text-gray-600" style="font-size: 0.8em; font-weight: normal;">${shop || 'فرع رقم 1'}</span>
                    </div>
                </div>
            `;
        }

        // تحديث المعاينة بناءً على المدخلات واختيار الطابعة
        function updateLabelPreview() {
            const name = inputs.name.value;
            const desc = inputs.desc.value;
            const price = inputs.price.value;
            const shop = inputs.shop.value || 'فرع رقم 1';
            const size = inputs.size.value;

            // تحديث الكلاس العام للتحكم في مقاسات الـ CSS
            bodyLayout.className = `min-h-screen flex flex-col items-center justify-center p-4 layout-${size}`;

            // تحديث شارة المعاينة
            if(size === '80') previewBadge.textContent = 'معاينة 8 سم';
            if(size === '58') previewBadge.textContent = 'معاينة 5.8 سم';
            if(size === 'split') previewBadge.textContent = 'معاينة 8 سم مقسوم';
            if(size === '50x35') previewBadge.textContent = 'معاينة 5×3.5 سم';

            // إذا كان الخيار مقسوم (split)، نقوم بعرض نسختين فوق بعض
            if (size === 'split') {
                const topLabel = buildSingleLabelHTML(name, desc, price, shop, true);
                const bottomLabel = buildSingleLabelHTML(name, desc, price, shop, false);
                printArea.innerHTML = topLabel + bottomLabel;
            } else {
                printArea.innerHTML = buildSingleLabelHTML(name, desc, price, shop); // استيكر واحد لباقي المقاسات
            }
            
            // حفظ الإعدادات في الذاكرة
            localStorage.setItem('thermal_shop_name', shop);
            localStorage.setItem('thermal_printer_size', size);
        }

        // إضافة مستمعي الأحداث لجميع الحقول لتحديث المعاينة فورياً
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', updateLabelPreview);
            input.addEventListener('change', updateLabelPreview);
        });

        // رسالة التنبيه المخصصة
        function showMessage(msg) {
            const msgBox = document.createElement('div');
            msgBox.className = 'fixed top-6 right-6 bg-red-100 border-r-4 border-red-500 text-red-800 px-6 py-4 rounded shadow-xl z-50 transition-all duration-300 transform font-bold flex items-center gap-3';
            msgBox.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span>${msg}</span>
            `;
            document.body.appendChild(msgBox);
            
            setTimeout(() => {
                msgBox.style.opacity = '0';
                msgBox.style.transform = 'translateY(-20px)';
                setTimeout(() => msgBox.remove(), 300);
            }, 3000);
        }

        // دالة الطباعة 
        function printLabel() {
            if (!inputs.name.value.trim()) {
                showMessage('الرجاء كتابة اسم الصنف أولاً!');
                inputs.name.focus();
                return;
            }
            if (!inputs.price.value.trim()) {
                showMessage('الرجاء كتابة السعر قبل الطباعة!');
                inputs.price.focus();
                return;
            }
            
            window.print();
        }

        // دالة تفريغ الحقول
        function clearFields() {
            inputs.name.value = '';
            inputs.desc.value = '';
            inputs.price.value = '';
            // لا نفرغ اسم الفرع أو مقاس الطابعة لتسهيل العمل
            updateLabelPreview();
            inputs.name.focus();
        }
    </script>
</body>
</html>
